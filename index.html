<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0f1e">
<title>السلاسل — Clock In</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0f1e;--card:#111827;--card2:#1a2234;--border:#1e2d45;
  --blue:#3b82f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --text:#f0f4ff;--muted:#64748b;--muted2:#94a3b8;
}
html,body{min-height:100vh;background:var(--bg);font-family:'Cairo',sans-serif;color:var(--text);overflow-x:hidden}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,0.12) 0%,transparent 60%);
}

.app{min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;padding:env(safe-area-inset-top,20px) 0 env(safe-area-inset-bottom,20px)}

/* HEADER */
.header{padding:20px 24px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.logo{width:42px;height:42px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:12px;display:grid;place-items:center;flex-shrink:0;box-shadow:0 0 20px rgba(59,130,246,0.3)}
.logo svg{width:22px;height:22px;fill:#fff}
.logo-text h1{font-size:18px;font-weight:900;line-height:1}
.logo-text p{font-size:11px;color:var(--muted2);margin-top:1px}

/* DRIVER SELECT */
.select-section{padding:20px 24px}
.section-label{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.driver-select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;font-weight:600;outline:none;appearance:none;-webkit-appearance:none;cursor:pointer}
.driver-select:focus{border-color:var(--blue)}
.driver-select option{background:var(--card);color:var(--text)}
.select-wrap{position:relative}
.select-wrap::after{content:'▼';position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}

/* STATUS CARD */
.status-card{margin:0 24px 20px;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.status-header{padding:14px 16px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.status-header .sh-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 2s infinite}
.status-header .sh-title{font-size:12px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px}
.status-body{padding:16px}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.status-row:last-child{margin:0}
.sr-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.sr-label{font-size:11px;color:var(--muted);flex:0 0 80px}
.sr-val{font-size:13px;font-weight:700;color:var(--text);flex:1}
.sr-val.mono{font-family:'JetBrains Mono',monospace;font-size:12px}

/* LOCATION */
.location-card{margin:0 24px 20px;background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.map-preview{height:140px;background:var(--card2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.map-preview::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(59,130,246,0.1) 0%,transparent 70%)}
.map-dot{width:16px;height:16px;background:var(--blue);border-radius:50%;box-shadow:0 0 0 4px rgba(59,130,246,0.2),0 0 0 8px rgba(59,130,246,0.1);animation:locPulse 2s infinite}
@keyframes locPulse{0%,100%{box-shadow:0 0 0 4px rgba(59,130,246,0.2),0 0 0 8px rgba(59,130,246,0.1)}50%{box-shadow:0 0 0 8px rgba(59,130,246,0.15),0 0 0 16px rgba(59,130,246,0.05)}}
.map-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(59,130,246,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.05) 1px,transparent 1px);background-size:30px 30px}
.loc-info{padding:12px 16px;font-size:11px;color:var(--muted2);display:flex;align-items:center;gap:6px}
.loc-info span{font-size:11px;color:var(--muted2)}
#loc-coords{font-family:'JetBrains Mono',monospace;font-size:11px}

/* MAIN BUTTON */
.btn-wrap{padding:0 24px 20px}
.clock-btn{
  width:100%;padding:18px;border:none;border-radius:18px;
  font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  transition:all .2s;position:relative;overflow:hidden;
}
.clock-btn.in{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 8px 24px rgba(16,185,129,0.35)}
.clock-btn.out{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;box-shadow:0 8px 24px rgba(239,68,68,0.35)}
.clock-btn:active{transform:scale(0.97)}
.clock-btn .btn-icon{font-size:22px}
.clock-btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .15s}
.clock-btn:active::after{background:rgba(255,255,255,0.1)}
.clock-btn:disabled{opacity:.5;cursor:not-allowed}

/* HISTORY */
.history{padding:0 24px 24px}
.history h3{font-size:13px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.hist-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px}
.hist-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hist-info{flex:1}
.hist-action{font-size:13px;font-weight:700}
.hist-time{font-size:11px;color:var(--muted);margin-top:1px;font-family:'JetBrains Mono',monospace}
.hist-loc{font-size:10px;color:var(--muted2);margin-top:2px}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(0,0,0,0.5);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.s{border-color:var(--green);color:var(--green)}
.toast.e{border-color:var(--red);color:var(--red)}

/* LOADING */
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,15,30,0.8);backdrop-filter:blur(4px);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* NO DRIVER */
.no-driver{text-align:center;padding:40px 24px;opacity:.4}
.no-driver .nd-icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
    </div>
    <div class="logo-text">
      <h1>السلاسل</h1>
      <p>نظام تسجيل الحضور</p>
    </div>
  </div>

  <!-- DRIVER SELECT -->
  <div class="select-section">
    <div class="section-label">اختر اسمك</div>
    <div class="select-wrap">
      <select class="driver-select" id="driverSel" onchange="onDriverChange()">
        <option value="">— اختر السائق —</option>
      </select>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-card" id="statusCard" style="display:none">
    <div class="status-header">
      <div class="sh-dot" id="statusDot"></div>
      <div class="sh-title" id="statusTitle">الحالة الحالية</div>
    </div>
    <div class="status-body">
      <div class="status-row">
        <span class="sr-icon">👤</span>
        <span class="sr-label">السائق</span>
        <span class="sr-val" id="st-name">—</span>
      </div>
      <div class="status-row">
        <span class="sr-icon">🤝</span>
        <span class="sr-label">الشريك</span>
        <span class="sr-val" id="st-partner">—</span>
      </div>
      <div class="status-row">
        <span class="sr-icon">⏰</span>
        <span class="sr-label">آخر تسجيل</span>
        <span class="sr-val mono" id="st-last">—</span>
      </div>
      <div class="status-row">
        <span class="sr-icon">📍</span>
        <span class="sr-label">الموقع</span>
        <span class="sr-val" id="st-loc">جاري التحديد...</span>
      </div>
    </div>
  </div>

  <!-- LOCATION -->
  <div class="location-card" id="locCard" style="display:none">
    <div class="map-preview">
      <div class="map-grid"></div>
      <div class="map-dot"></div>
    </div>
    <div class="loc-info">
      📍 <span id="loc-coords">جاري تحديد الموقع...</span>
    </div>
  </div>

  <!-- MAIN BUTTON -->
  <div class="btn-wrap" id="btnWrap" style="display:none">
    <button class="clock-btn in" id="clockBtn" onclick="doClock()">
      <span class="btn-icon" id="btnIcon">✅</span>
      <span id="btnText">Clock In — تسجيل الدخول</span>
    </button>
  </div>

  <!-- NO DRIVER STATE -->
  <div class="no-driver" id="noDriver">
    <div class="nd-icon">👆</div>
    <p>اختر اسمك من القائمة أعلاه</p>
  </div>

  <!-- HISTORY -->
  <div class="history" id="histSection" style="display:none">
    <h3>آخر التسجيلات اليوم</h3>
    <div id="histList"></div>
  </div>

</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--muted2)" id="loadingText">جاري التسجيل...</div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG — Supabase
// ============================================================
const SUPA_URL = 'https://pqpowedqewjgkrzvmgyv.supabase.co';
const SUPA_KEY = 'sb_publishable_EX532ME5SLrt26Gp3YkRXQ_rt9-oaRT';

// ============================================================
// DRIVERS DATA
// ============================================================
const DRIVERS = [
  {id:'SA1001', name:'ASHRAF MOHAMED',           partner:'Keeta'},
  {id:'SA1002', name:'Anik Rudra paul',           partner:'Keeta'},
  {id:'SA1003', name:'PHIROJ HUSEN ANSARI',       partner:'Keeta'},
  {id:'SA1004', name:'RAJ KUMAR BK',              partner:'Keeta'},
  {id:'SA1005', name:'Heshmat Ali',               partner:'Keeta'},
  {id:'SA1006', name:'Saddam Ansari',             partner:'Keeta'},
  {id:'SA1007', name:'Shabir Alam',               partner:'Keeta'},
  {id:'SA1008', name:'Vishnu Arjun Rathod',       partner:'Keeta'},
  {id:'SA1009', name:'Ghulam Sarwar',             partner:'Keeta'},
  {id:'SA1010', name:'Swarup Nath',               partner:'Keeta'},
  {id:'SA1011', name:'SAKAR CHAUDHARY',           partner:'Keeta'},
  {id:'SA1012', name:'peterclever anyanwuocha',   partner:'Keeta'},
  {id:'SA1013', name:'DANIEL AKPAH',              partner:'Keeta'},
  {id:'SA1014', name:'MARK OTENG KONADU',         partner:'Keeta'},
  {id:'SA1015', name:'Kalashdeep Singh',          partner:'Caboria'},
  {id:'SA1016', name:'SANTOSH PRASAD SAH KANU',  partner:'Caboria'},
  {id:'SA1017', name:'RAMIT KUMAR SINGH',         partner:'Caboria'},
  {id:'SA1018', name:'SHUSHIL SAH',               partner:'Caboria'},
  {id:'SA1019', name:'SHYAM SUNDAR PRASAD',       partner:'HOMY'},
  {id:'SA1020', name:'ANAND KUMAR CHAUDARY',      partner:'iMile'},
  {id:'SA1021', name:'RAMIT KUMAR SIGH',          partner:'iMile'},
  {id:'SA1022', name:'DANISH PARYA',              partner:'HOMY'},
  {id:'SA1023', name:'NISHAN CHAUDHARY',          partner:'iMile'},
  {id:'SA1024', name:'CHANDRA DEV YADAV',         partner:'iMile'},
  {id:'SA1025', name:'IRSHAD MIYA',               partner:'iMile'},
  {id:'SA1026', name:'Rphael Selvester',          partner:'Caboria'},
  {id:'SA1027', name:'Prince ugwueze',            partner:'Caboria'},
  {id:'SA1028', name:'Promise Chikelitem',        partner:'HOMY'},
  {id:'SA1029', name:'Chika nwaogwugwu',          partner:'HOMY'},
  {id:'SA1030', name:'okechukuw michael',         partner:'HOMY'},
  {id:'SA1031', name:'mohamed osama',             partner:'Caboria'},
  {id:'SA1032', name:'Emmanuel chidiebere',       partner:'HOMY'},
  {id:'SA1033', name:'Samson Nwachukwu Akanezie', partner:'HOMY'},
  {id:'SA1034', name:'aaron hussaini timoty',     partner:'HOMY'},
  {id:'SA1035', name:'Bartholomew Kaku Niamh',   partner:''},
  {id:'SA1036', name:'sylvester kopu',            partner:''},
];

// ============================================================
// STATE
// ============================================================
let currentDriver = null;
let currentLat    = null;
let currentLng    = null;
let currentAcc    = null;
let isClockIn     = true; // true = next action is clock in
let todayRecords  = [];

// ============================================================
// INIT
// ============================================================
window.onload = function(){
  // Populate driver select
  const sel = document.getElementById('driverSel');
  DRIVERS.forEach(d => {
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.name + ' (' + d.id + ')';
    sel.appendChild(opt);
  });

  // Start getting location
  startLocation();

  // Update clock every second
  setInterval(updateClock, 1000);
};

// ============================================================
// LOCATION
// ============================================================
function startLocation(){
  if(!navigator.geolocation){
    document.getElementById('loc-coords').textContent = 'الموقع غير متاح';
    return;
  }
  navigator.geolocation.watchPosition(
    pos => {
      currentLat = pos.coords.latitude;
      currentLng = pos.coords.longitude;
      currentAcc = pos.coords.accuracy;
      const coords = currentLat.toFixed(5) + ', ' + currentLng.toFixed(5);
      document.getElementById('loc-coords').textContent = coords + ' (±' + Math.round(currentAcc) + 'm)';
      document.getElementById('st-loc').textContent = coords;
    },
    err => {
      document.getElementById('loc-coords').textContent = 'تعذر تحديد الموقع';
      document.getElementById('st-loc').textContent = 'غير متاح';
    },
    {enableHighAccuracy: true, maximumAge: 10000, timeout: 15000}
  );
}

function updateClock(){
  // Nothing to update here for now
}

// ============================================================
// DRIVER CHANGE
// ============================================================
async function onDriverChange(){
  const sel = document.getElementById('driverSel');
  const id  = sel.value;

  if(!id){
    document.getElementById('statusCard').style.display = 'none';
    document.getElementById('locCard').style.display    = 'none';
    document.getElementById('btnWrap').style.display    = 'none';
    document.getElementById('histSection').style.display= 'none';
    document.getElementById('noDriver').style.display   = 'block';
    return;
  }

  currentDriver = DRIVERS.find(d => d.id === id);
  document.getElementById('noDriver').style.display    = 'none';
  document.getElementById('statusCard').style.display  = 'block';
  document.getElementById('locCard').style.display     = 'block';
  document.getElementById('btnWrap').style.display     = 'block';
  document.getElementById('histSection').style.display = 'block';

  document.getElementById('st-name').textContent    = currentDriver.name;
  document.getElementById('st-partner').textContent = currentDriver.partner || '—';

  await loadTodayRecords();
}

// ============================================================
// LOAD TODAY RECORDS
// ============================================================
async function loadTodayRecords(){
  if(!currentDriver) return;

  const today = new Date().toISOString().split('T')[0];
  const url = SUPA_URL + '/rest/v1/clockin?driver_id=eq.' + currentDriver.id
    + '&created_at=gte.' + today + 'T00:00:00'
    + '&order=created_at.desc&limit=10';

  try {
    const res = await fetch(url, {
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY
      }
    });
    todayRecords = await res.json();
    updateUI();
  } catch(e) {
    console.error('Error loading records:', e);
  }
}

// ============================================================
// UPDATE UI BASED ON RECORDS
// ============================================================
function updateUI(){
  // Determine if clocked in or out
  if(todayRecords.length > 0){
    const last = todayRecords[0];
    isClockIn = last.action === 'clock_out';

    const lastTime = new Date(last.created_at);
    const timeStr = lastTime.toLocaleTimeString('ar-KW', {hour:'2-digit', minute:'2-digit'});
    document.getElementById('st-last').textContent = (last.action === 'clock_in' ? '🟢 دخول' : '🔴 خروج') + ' — ' + timeStr;

    // Status dot color
    const dot = document.getElementById('statusDot');
    dot.style.background = last.action === 'clock_in' ? 'var(--green)' : 'var(--red)';
    document.getElementById('statusTitle').textContent = last.action === 'clock_in' ? 'مسجل الدخول' : 'مسجل الخروج';
  } else {
    isClockIn = true;
    document.getElementById('st-last').textContent = 'لم يتم التسجيل بعد';
    document.getElementById('statusDot').style.background = 'var(--muted)';
    document.getElementById('statusTitle').textContent = 'لم يتم التسجيل';
  }

  // Update button
  const btn  = document.getElementById('clockBtn');
  const icon = document.getElementById('btnIcon');
  const text = document.getElementById('btnText');

  if(isClockIn){
    btn.className = 'clock-btn in';
    icon.textContent = '✅';
    text.textContent = 'Clock In — تسجيل الدخول';
  } else {
    btn.className = 'clock-btn out';
    icon.textContent = '🔴';
    text.textContent = 'Clock Out — تسجيل الخروج';
  }

  // Update history
  const histList = document.getElementById('histList');
  if(todayRecords.length === 0){
    histList.innerHTML = '<div style="text-align:center;padding:20px;color:var(--muted);font-size:12px">لا توجد تسجيلات اليوم</div>';
    return;
  }

  histList.innerHTML = todayRecords.map(r => {
    const t = new Date(r.created_at);
    const timeStr = t.toLocaleTimeString('ar-KW', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
    const isIn = r.action === 'clock_in';
    const locStr = r.latitude ? r.latitude.toFixed(4) + ', ' + r.longitude.toFixed(4) : 'الموقع غير متاح';
    return `
      <div class="hist-item">
        <div class="hist-dot" style="background:${isIn?'var(--green)':'var(--red)'}"></div>
        <div class="hist-info">
          <div class="hist-action" style="color:${isIn?'var(--green)':'var(--red)'}">${isIn?'🟢 Clock In — دخول':'🔴 Clock Out — خروج'}</div>
          <div class="hist-time">${timeStr}</div>
          <div class="hist-loc">📍 ${locStr}</div>
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// DO CLOCK IN/OUT
// ============================================================
async function doClock(){
  if(!currentDriver){
    toast('يرجى اختيار اسمك أولاً', 'e');
    return;
  }

  showLoading(true, isClockIn ? 'جاري تسجيل الدخول...' : 'جاري تسجيل الخروج...');

  // Get location
  let lat = currentLat, lng = currentLng, acc = currentAcc;

  if(!lat){
    // Try to get location now
    try {
      const pos = await new Promise((res, rej) => {
        navigator.geolocation.getCurrentPosition(res, rej, {enableHighAccuracy:true, timeout:10000});
      });
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      acc = pos.coords.accuracy;
    } catch(e) {
      // Continue without location
    }
  }

  const action = isClockIn ? 'clock_in' : 'clock_out';
  const now = new Date();

  try {
    const res = await fetch(SUPA_URL + '/rest/v1/clockin', {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({
        driver_id:   currentDriver.id,
        driver_name: currentDriver.name,
        partner:     currentDriver.partner,
        action:      action,
        latitude:    lat,
        longitude:   lng,
        accuracy:    acc
      })
    });

    showLoading(false);

    if(res.ok || res.status === 201){
      const actionAr = isClockIn ? 'تم تسجيل الدخول ✅' : 'تم تسجيل الخروج 🔴';
      toast(actionAr, 's');
      await loadTodayRecords();
    } else {
      toast('حدث خطأ، يرجى المحاولة مرة أخرى', 'e');
    }
  } catch(e) {
    showLoading(false);
    toast('تعذر الاتصال بالسيرفر', 'e');
  }
}

// ============================================================
// HELPERS
// ============================================================
function showLoading(show, text){
  const ov = document.getElementById('loadingOverlay');
  ov.classList.toggle('show', show);
  if(text) document.getElementById('loadingText').textContent = text;
}

function toast(msg, type='s'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
