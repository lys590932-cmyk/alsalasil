<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>AL-SALASIL FLY | تطبيق السائقين</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#2d333b;--br:#30363d;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#10b981;--green2:#34d399;
  --amber:#f59e0b;--amber2:#fbbf24;--red:#ef4444;--red2:#f87171;--purple:#a855f7;
  --text:#e6edf3;--muted:#8b949e;--muted2:#7d8590;
  --r:12px;--r2:16px;--r3:20px;
}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;line-height:1.5;
  padding-top:env(safe-area-inset-top);
}
button,input,select{font-family:'Cairo',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:0;height:0}
.hide{display:none!important}

/* ===================== LOGIN ===================== */
#loginScreen{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 22px;position:relative;
  background:radial-gradient(circle at 50% 0%,rgba(59,130,246,0.12),transparent 55%),var(--bg);
}
.lang-switch{
  position:absolute;top:14px;inset-inline-end:16px;z-index:10;
  background:var(--s1);border:1px solid var(--br);border-radius:20px;
  padding:7px 13px;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:5px;
}
.lang-switch i{font-size:15px}
.login-logo{
  width:260px;max-width:80%;background:#fff;border-radius:18px;
  padding:16px 18px;margin-bottom:20px;box-shadow:0 12px 36px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
}
.login-logo img{width:100%;height:auto;display:block}
.login-logo .ti{font-size:48px;color:#1c5571}
.login-title{font-size:24px;font-weight:900;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:34px}
.login-card{
  width:100%;max-width:380px;background:var(--s1);border:1px solid var(--br);
  border-radius:var(--r3);padding:24px 20px;
}
.login-card h2{font-size:16px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.login-card p.lc-hint{font-size:11px;color:var(--muted);margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--muted2);margin-bottom:6px;letter-spacing:.3px}
.field .inp-wrap{position:relative}
.field .inp-wrap i{position:absolute;inset-inline-end:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:18px}
.field input{
  width:100%;background:var(--s2);border:1.5px solid var(--br);border-radius:var(--r);
  padding:13px;padding-inline-end:42px;padding-inline-start:14px;
  color:var(--text);font-size:15px;font-weight:600;outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--blue)}
.field input::placeholder{color:var(--muted2);font-weight:400}
.btn-primary{
  width:100%;background:linear-gradient(135deg,var(--blue),#2563eb);border:none;border-radius:var(--r);
  padding:14px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;display:flex;
  align-items:center;justify-content:center;gap:8px;transition:transform .1s,opacity .15s;
}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}
.remember{display:flex;align-items:center;gap:8px;margin:4px 0 18px;font-size:12px;color:var(--muted)}
.remember input{width:17px;height:17px;accent-color:var(--blue);flex-shrink:0}
.login-err{
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:var(--red2);
  border-radius:10px;padding:10px 13px;font-size:12px;font-weight:600;margin-bottom:14px;
  display:flex;align-items:center;gap:7px;
}
.login-foot{margin-top:24px;font-size:11px;color:var(--muted2);text-align:center;line-height:1.7}

/* ===================== APP SHELL ===================== */
#appScreen{min-height:100vh;display:flex;flex-direction:column;padding-bottom:calc(72px + env(safe-area-inset-bottom))}
.appbar{
  position:sticky;top:0;z-index:50;background:rgba(13,17,23,0.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--br);padding:12px 16px;display:flex;align-items:center;gap:10px;
}
.ab-av{
  width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
  font-size:15px;font-weight:900;color:#fff;flex-shrink:0;
}
.ab-info{flex:1;min-width:0}
.ab-hi{font-size:11px;color:var(--muted)}
.ab-name{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ab-lang,.ab-bell{
  position:relative;width:42px;height:42px;border-radius:13px;background:var(--s1);
  border:1px solid var(--br);display:grid;place-items:center;cursor:pointer;color:var(--text);flex-shrink:0;
}
.ab-lang{font-size:14px;font-weight:800}
.ab-bell i{font-size:21px}
.bell-dot{
  position:absolute;top:7px;inset-inline-start:8px;min-width:17px;height:17px;padding:0 4px;background:var(--red);
  border-radius:9px;font-size:10px;font-weight:800;color:#fff;display:grid;place-items:center;border:2px solid var(--bg);
}

/* content */
.screen{flex:1;padding:16px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}}
.sec-title{font-size:12px;font-weight:800;color:var(--muted2);letter-spacing:.5px;margin:18px 4px 9px;text-transform:uppercase}
.sec-title:first-child{margin-top:2px}

/* cards */
.card{background:var(--s1);border:1px solid var(--br);border-radius:var(--r2);overflow:hidden}
.card-pad{padding:15px}

/* status hero */
.hero{
  border-radius:var(--r3);padding:20px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#1f6feb,#2563eb);
}
.hero.out{background:linear-gradient(135deg,#475569,#334155)}
.hero::after{
  content:"";position:absolute;inset-inline-start:-30px;top:-30px;width:140px;height:140px;
  background:rgba(255,255,255,0.08);border-radius:50%;
}
.hero-label{font-size:12px;opacity:.85;font-weight:600}
.hero-status{font-size:26px;font-weight:900;margin:3px 0 2px;display:flex;align-items:center;gap:9px}
.hero-time{font-size:12px;opacity:.8}
.hero-pulse{width:11px;height:11px;border-radius:50%;background:#34d399;box-shadow:0 0 0 0 rgba(52,211,153,.7);animation:pulse 2s infinite}
.hero.out .hero-pulse{background:#f87171;animation:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,211,153,.6)}70%{box-shadow:0 0 0 12px rgba(52,211,153,0)}100%{box-shadow:0 0 0 0 rgba(52,211,153,0)}}

/* big action button */
.clock-btn{
  width:100%;border:none;border-radius:var(--r2);padding:17px;font-size:16px;font-weight:900;
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
  margin-top:13px;transition:transform .1s;
}
.clock-btn:active{transform:scale(.98)}
.clock-btn:disabled{opacity:.55}
.clock-in{background:linear-gradient(135deg,var(--green),#059669)}
.clock-out{background:linear-gradient(135deg,var(--red),#dc2626)}
.clock-btn i{font-size:22px}

/* quick stat grid */
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.qstat{background:var(--s1);border:1px solid var(--br);border-radius:var(--r2);padding:14px}
.qstat-top{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.qstat-ic{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.qstat-ic i{font-size:17px}
.qstat-lbl{font-size:11px;color:var(--muted)}
.qstat-val{font-size:21px;font-weight:900}
.qstat-sub{font-size:11px;color:var(--muted);margin-top:1px}

/* info rows */
.irow{display:flex;align-items:center;gap:11px;padding:13px 15px;border-bottom:1px solid rgba(48,54,61,.55)}
.irow:last-child{border-bottom:none}
.irow-ic{width:34px;height:34px;border-radius:10px;background:var(--s2);display:grid;place-items:center;flex-shrink:0}
.irow-ic i{font-size:18px;color:var(--muted)}
.irow-body{flex:1;min-width:0}
.irow-lbl{font-size:11px;color:var(--muted)}
.irow-val{font-size:14px;font-weight:700;word-break:break-word}
.irow-val.mono{font-size:13px}

/* badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:800}
.b-green{background:rgba(16,185,129,.16);color:var(--green2)}
.b-amber{background:rgba(245,158,11,.16);color:var(--amber2)}
.b-red{background:rgba(239,68,68,.16);color:var(--red2)}
.b-blue{background:rgba(59,130,246,.16);color:var(--blue2)}
.b-gray{background:var(--s2);color:var(--muted)}

/* salary */
.sal-hero{
  border-radius:var(--r3);padding:22px 20px;background:linear-gradient(135deg,#065f46,#047857);
  color:#fff;text-align:center;position:relative;overflow:hidden;
}
.sal-hero::after{content:"";position:absolute;inset-inline-end:-40px;bottom:-40px;width:150px;height:150px;background:rgba(255,255,255,.07);border-radius:50%}
.sal-net-lbl{font-size:13px;opacity:.85;font-weight:600}
.sal-net-val{font-size:38px;font-weight:900;margin:4px 0;line-height:1}
.sal-net-cur{font-size:15px;opacity:.85}
.sal-split{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.sal-box{background:var(--s1);border:1px solid var(--br);border-radius:var(--r2);padding:14px;text-align:center}
.sal-box-v{font-size:20px;font-weight:900}
.sal-box-l{font-size:11px;color:var(--muted);margin-top:2px}
.month-pick{display:flex;gap:8px;margin-bottom:13px}
.month-pick select{
  flex:1;background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:11px;
  color:var(--text);font-size:13px;font-weight:700;outline:none;
}
.ded-item{display:flex;align-items:center;gap:11px;padding:13px 14px;border-bottom:1px solid rgba(48,54,61,.55)}
.ded-item:last-child{border-bottom:none}
.ded-ic{width:36px;height:36px;border-radius:11px;background:rgba(239,68,68,.13);display:grid;place-items:center;flex-shrink:0}
.ded-ic i{font-size:18px;color:var(--red2)}
.ded-body{flex:1;min-width:0}
.ded-reason{font-size:13px;font-weight:700}
.ded-date{font-size:11px;color:var(--muted);margin-top:1px}
.ded-amt{font-size:14px;font-weight:900;color:var(--red2);white-space:nowrap}

/* clockin history */
.ci-item{display:flex;align-items:center;gap:11px;padding:13px 14px;border-bottom:1px solid rgba(48,54,61,.55)}
.ci-item:last-child{border-bottom:none}
.ci-dot{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.ci-dot.in{background:rgba(16,185,129,.14)} .ci-dot.in i{color:var(--green2)}
.ci-dot.out{background:rgba(239,68,68,.14)} .ci-dot.out i{color:var(--red2)}
.ci-dot i{font-size:19px}
.ci-body{flex:1;min-width:0}
.ci-act{font-size:13px;font-weight:800}
.ci-meta{font-size:11px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px}
.ci-time{font-size:13px;font-weight:800;white-space:nowrap}
.ci-loc-link{color:var(--blue2);font-size:11px;font-weight:700;text-decoration:none}

/* notif */
.nt-item{display:flex;gap:12px;padding:14px;border-bottom:1px solid rgba(48,54,61,.55)}
.nt-item:last-child{border-bottom:none}
.nt-ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex-shrink:0}
.nt-ic i{font-size:20px}
.nt-body{flex:1;min-width:0}
.nt-title{font-size:13px;font-weight:800}
.nt-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.55}
.nt-time{font-size:10px;color:var(--muted2);margin-top:5px}

/* empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty i{font-size:46px;opacity:.4;display:block;margin-bottom:10px}
.empty p{font-size:13px}
.empty .e-sub{font-size:11px;color:var(--muted2);margin-top:4px}

/* loader */
.spinner{width:34px;height:34px;border:3px solid var(--s2);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* btn secondary */
.btn-sec{
  width:100%;background:var(--s1);border:1px solid var(--br);border-radius:var(--r);padding:13px;
  color:var(--text);font-size:14px;font-weight:700;cursor:pointer;display:flex;
  align-items:center;justify-content:center;gap:8px;transition:border-color .15s;
}
.btn-sec:active{border-color:var(--blue)}
.btn-danger{color:var(--red2);border-color:rgba(239,68,68,.3)}
.btn-refresh{
  background:var(--s1);border:1px solid var(--br);border-radius:11px;padding:9px 14px;
  color:var(--text);font-size:12px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;
}

/* bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(22,27,34,0.97);
  backdrop-filter:blur(14px);border-top:1px solid var(--br);display:flex;
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));
}
.navbtn{
  flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:5px 0;color:var(--muted2);transition:color .15s;
}
.navbtn i{font-size:23px}
.navbtn span{font-size:10px;font-weight:700}
.navbtn.on{color:var(--blue2)}
.navbtn.on i{transform:translateY(-1px)}

/* toast */
.toast{
  position:fixed;left:50%;transform:translateX(-50%) translateY(120px);
  bottom:calc(86px + env(safe-area-inset-bottom));background:var(--s3);border:1px solid var(--br);
  color:var(--text);padding:12px 18px;border-radius:13px;font-size:13px;font-weight:700;
  z-index:200;transition:transform .3s cubic-bezier(.2,.9,.3,1);max-width:88%;
  display:flex;align-items:center;gap:8px;box-shadow:0 12px 30px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.t-ok{border-color:rgba(16,185,129,.4)} .toast.t-ok i{color:var(--green2)}
.toast.t-err{border-color:rgba(239,68,68,.4)} .toast.t-err i{color:var(--red2)}
.toast.t-info i{color:var(--blue2)}

/* sheet (notifications panel) */
.sheet-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-ov.on{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:160;background:var(--bg);
  border-radius:22px 22px 0 0;border-top:1px solid var(--br);max-height:80vh;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.9,.3,1);
  display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom);
}
.sheet.on{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;background:var(--br);border-radius:3px;margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 12px;border-bottom:1px solid var(--br)}
.sheet-head h3{font-size:15px;font-weight:900;display:flex;align-items:center;gap:8px}
.sheet-close{width:32px;height:32px;border-radius:10px;background:var(--s1);border:1px solid var(--br);color:var(--text);display:grid;place-items:center;cursor:pointer}
.sheet-body{overflow-y:auto;flex:1}

/* license alert banner */
.lic-banner{display:flex;align-items:center;gap:11px;padding:13px 15px;border-radius:var(--r2);margin-top:12px}
.lic-banner.warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.lic-banner.bad{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3)}
.lic-banner i{font-size:24px;flex-shrink:0}
.lic-banner.warn i{color:var(--amber2)} .lic-banner.bad i{color:var(--red2)}
.lic-banner-t{font-size:13px;font-weight:800}
.lic-banner-d{font-size:11px;color:var(--muted);margin-top:1px}

/* misc */
.flex-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.gps-hint{font-size:11px;color:var(--muted2);text-align:center;margin-top:9px;display:flex;align-items:center;justify-content:center;gap:5px}
.offline-bar{background:var(--amber);color:#000;font-size:12px;font-weight:800;text-align:center;padding:6px;display:none}
.offline-bar.show{display:block}
</style>
</head>
<body>

<!-- ============ OFFLINE BAR ============ -->
<div class="offline-bar" id="offlineBar"><i class="ti ti-wifi-off"></i> <span data-i18n="offline">لا يوجد اتصال بالإنترنت</span></div>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen" class="hide">
  <button class="lang-switch" id="loginLang" onclick="toggleLang()"><i class="ti ti-language"></i> <span id="loginLangTxt">English</span></button>
  <div class="login-logo"><img src="logo.png" alt="Al-Salasil" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'ti ti-steering-wheel\'></i>'"></div>
  <div class="login-title" data-i18n="company">شركة السلاسل</div>
  <div class="login-sub" data-i18n="app_sub">تطبيق السائقين</div>

  <div class="login-card">
    <h2><i class="ti ti-login-2" style="color:var(--blue)"></i> <span data-i18n="login_title">تسجيل الدخول</span></h2>
    <p class="lc-hint" data-i18n="login_hint">ادخل كود الموظف ورقم هاتفك المسجّل لدى الإدارة</p>

    <div class="login-err hide" id="loginErr"><i class="ti ti-alert-triangle"></i><span id="loginErrTxt"></span></div>

    <div class="field">
      <label data-i18n="emp_code">كود الموظف</label>
      <div class="inp-wrap">
        <i class="ti ti-id-badge-2"></i>
        <input type="text" id="inpCode" data-i18n-ph="code_ph" placeholder="مثال: SA1001" autocomplete="off" autocapitalize="characters">
      </div>
    </div>
    <div class="field">
      <label data-i18n="phone">رقم الهاتف</label>
      <div class="inp-wrap">
        <i class="ti ti-phone"></i>
        <input type="tel" id="inpPhone" data-i18n-ph="phone_ph" placeholder="مثال: 9XXXXXXXX" autocomplete="off" inputmode="numeric">
      </div>
    </div>

    <label class="remember">
      <input type="checkbox" id="inpRemember" checked>
      <span data-i18n="remember">تذكّرني على هذا الجهاز</span>
    </label>

    <button class="btn-primary" id="loginBtn" onclick="doLogin()">
      <i class="ti ti-login-2"></i> <span data-i18n="login_btn">دخول</span>
    </button>
  </div>

  <div class="login-foot">
    <span data-i18n="login_foot">إذا واجهت مشكلة في الدخول تواصل مع الإدارة</span><br>
    <span data-i18n="company_full">© شركة السلاسل لإدارة السائقين</span>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="appScreen" class="hide">

  <div class="appbar">
    <div class="ab-av" id="abAv">--</div>
    <div class="ab-info">
      <div class="ab-hi" id="abHi">أهلاً</div>
      <div class="ab-name" id="abName">—</div>
    </div>
    <div class="ab-lang" id="abLang" onclick="toggleLang()">EN</div>
    <div class="ab-bell" onclick="openNotif()">
      <i class="ti ti-bell"></i>
      <span class="bell-dot hide" id="bellDot">0</span>
    </div>
  </div>

  <div class="screen" id="scrHome"></div>
  <div class="screen hide" id="scrAttendance"></div>

function t(key){
  var v = (I18N[LANG] && I18N[LANG][key]);
  if(v===undefined) v = I18N.ar[key];
  if(typeof v === 'function') return v.apply(null, Array.prototype.slice.call(arguments,1));
  return v!==undefined ? v : key;
}

/* ---------- HELPERS ---------- */
function $(id){ return document.getElementById(id); }
function digits(s){ return (s||'').toString().replace(/[^0-9]/g,''); }
function initials(n){ return (n||'?').trim().split(/\s+/).map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase(); }
function avColor(seed){
  var h=0, s=(seed||'')+'';
  for(var i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0;
  return AV_COLORS[h % AV_COLORS.length];
}
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function fmtKD(n){ return (parseFloat(n)||0).toFixed(3); }
function fmtTime(d){
  try{ return new Date(d).toLocaleTimeString(LANG==='ar'?'ar-EG':'en-GB',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return '—'; }
}
function fmtDate(d){
  if(!d) return '—';
  try{
    var dt=new Date(d);
    if(isNaN(dt.getTime())) return d;
    return dt.getDate()+' '+MONTHS[LANG][dt.getMonth()]+' '+dt.getFullYear();
  }catch(e){ return d; }
}
function fmtDateTime(d){ return fmtDate(d)+' • '+fmtTime(d); }

function toast(msg, type){
  type = type||'info';
  var el=$('toast'); $('toastTxt').textContent=msg;
  el.className='toast t-'+type+' show';
  var ic=el.querySelector('i');
  ic.className = type==='ok'?'ti ti-circle-check':type==='err'?'ti ti-alert-triangle':'ti ti-info-circle';
  clearTimeout(el._tm); el._tm=setTimeout(function(){ el.classList.remove('show'); },2800);
}

/* حالة الرخصة / الإقامة */
function expiryStatus(dateStr){
  if(!dateStr) return {cls:'b-gray',label:t('exp_undefined'),days:null,level:'none'};
  var dt=new Date(dateStr);
  if(isNaN(dt.getTime())) return {cls:'b-gray',label:t('exp_undefined'),days:null,level:'none'};
  var days = Math.floor((dt - Date.now())/86400000);
  if(days < 0)   return {cls:'b-red',  label:t('exp_expired'),  days:days,level:'bad'};
  if(days <= 30) return {cls:'b-red',  label:t('days_left',days),days:days,level:'bad'};
  if(days <= 90) return {cls:'b-amber',label:t('days_left',days),days:days,level:'warn'};
  return {cls:'b-green',label:t('exp_valid'),days:days,level:'ok'};
}

/* ---------- SUPABASE REST ---------- */
function sb(path, opts){
  opts = opts||{};
  var headers = {
    'apikey':SUPA_KEY,
    'Authorization':'Bearer '+SUPA_KEY,
    'Content-Type':'application/json'
  };
  if(opts.headers) for(var k in opts.headers) headers[k]=opts.headers[k];
  return fetch(SUPA_URL+'/rest/v1/'+path, {
    method: opts.method||'GET',
    headers: headers,
    body: opts.body
  }).then(function(res){
    if(!res.ok){
      return res.text().catch(function(){return '';}).then(function(txt){
        throw new Error('Supabase '+res.status+' '+txt.slice(0,120));
      });
    }
    var ct = res.headers.get('content-type')||'';
    return ct.indexOf('application/json')>=0 ? res.json() : null;
  });
}

function showLoginErr(msg){
  $('loginErrTxt').textContent = msg;
  $('loginErr').classList.remove('hide');
}
function hideLoginErr(){ $('loginErr').classList.add('hide'); }

function doLogin(){
  hideLoginErr();
  var code  = $('inpCode').value.trim().toUpperCase();
  var phone = digits($('inpPhone').value);
  if(!code){ showLoginErr(t('err_no_code')); return; }
  if(!phone || phone.length < 6){ showLoginErr(t('err_bad_phone')); return; }

  var btn=$('loginBtn');
  btn.disabled=true;
  btn.innerHTML='<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> '+t('verifying');

  sb('drivers?id=eq.'+encodeURIComponent(code)+'&select=*').then(function(rows){
    if(!rows || !rows.length){
      showLoginErr(t('err_not_found'));
      return;
    }
    var d = rows[0];
    var storedPhone  = digits(d.sim).replace(/^965/,'');
    var enteredPhone = phone.replace(/^965/,'');
    if(storedPhone && enteredPhone && storedPhone !== enteredPhone){
      showLoginErr(t('err_phone_mismatch'));
      return;
    }
    DRIVER = d;
    if($('inpRemember').checked){
      localStorage.setItem(SK_SESSION, JSON.stringify({id:d.id, phone:enteredPhone}));
    }else{
      localStorage.removeItem(SK_SESSION);
    }
    enterApp(false);
  }).catch(function(err){
    console.error(err);
    showLoginErr(t('err_server'));
  }).then(function(){
    btn.disabled=false;
    btn.innerHTML='<i class="ti ti-login-2"></i> <span>'+t('login_btn')+'</span>';
  });
}

function tryAutoLogin(){
  var sess=null;
  try{ sess=JSON.parse(localStorage.getItem(SK_SESSION)||'null'); }catch(e){}
  if(!sess || !sess.id){
    $('loginScreen').classList.remove('hide');
    return;
  }

  var cache = loadCache();
  var shownFromCache = false;
  if(cache && cache.driver && cache.driver.id === sess.id){
    DRIVER     = cache.driver;
    CLOCKINS   = cache.clockins||[];
    DEDUCTIONS = cache.deductions||[];
    SCHEDULES  = cache.schedules||[];
    MESSAGES   = cache.messages||[];
    enterApp(true);
    shownFromCache = true;
  }

  sb('drivers?id=eq.'+encodeURIComponent(sess.id)+'&select=*').then(function(rows){
    if(rows && rows.length){
      DRIVER = rows[0];
      if(!shownFromCache){ enterApp(false); }
      else { renderAppBar(); refreshAll(); }
    }else if(!shownFromCache){
      $('loginScreen').classList.remove('hide');
    }
  }).catch(function(e){
    if(!shownFromCache){
      $('loginScreen').classList.remove('hide');
    }else{
      updateOfflineBar(false);
    }
  });
}

function logout(){
  if(!confirm(t('logout_confirm'))) return;
  stopLiveTracking();
  localStorage.removeItem(SK_SESSION);
  localStorage.removeItem(SK_CACHE);
  DRIVER=null; CLOCKINS=[]; DEDUCTIONS=[]; SCHEDULES=[]; NOTIFS=[];
  $('appScreen').classList.add('hide');
  $('loginScreen').classList.remove('hide');
  $('inpPhone').value='';
  window.scrollTo(0,0);
}

function refreshAll(){
  if(!DRIVER) return;
  var id = encodeURIComponent(DRIVER.id);
  Promise.all([
    sb('clockin?driver_id=eq.'+id+'&order=created_at.desc&limit=60').catch(function(){return null;}),
    sb('deductions?driver_id=eq.'+id+'&order=date.desc&limit=200').catch(function(){return null;}),
    sb('schedules?driver_id=eq.'+id+'&order=date.asc&limit=60').catch(function(){return null;}),
    sb('messages?or=(recipient.eq.'+id+',recipient.eq.ALL)&order=created_at.desc&limit=30').catch(function(){return null;})
  ]).then(function(r){
    if(r[0]) CLOCKINS   = r[0];
    if(r[1]) DEDUCTIONS = r[1];
    if(r[2]) SCHEDULES  = r[2];
    if(r[3]) MESSAGES   = r[3];
    saveCache();
    updateOfflineBar(true);
    computeNotifs();
    renderCurrentTab();
  }).catch(function(e){
    console.error('refresh error', e);
    updateOfflineBar(false);
    computeNotifs();
    renderCurrentTab();
  });
}

function updateOfflineBar(online){
  var bar=$('offlineBar');
  if(online===false || !navigator.onLine) bar.classList.add('show');
  else bar.classList.remove('show');
}

function lastClockin(){ return CLOCKINS.length ? CLOCKINS[0] : null; }
function isCurrentlyIn(){
  var l=lastClockin();
  return !!(l && l.action==='clock_in');
}
function todayClockins(){
  var ts=todayStr();
  return CLOCKINS.filter(function(r){ return (r.created_at||'').indexOf(ts)===0; });
}

function deductionsOf(month, year){
  return DEDUCTIONS.filter(function(d){
    if(d.month!=null && d.year!=null) return (+d.month)===month && (+d.year)===year;
    if(!d.date) return false;
    var dt=new Date(d.date);
    return dt.getMonth()+1===month && dt.getFullYear()===year;
  });
}

function shiftOf(dateStr){
  for(var i=0;i<SCHEDULES.length;i++) if(SCHEDULES[i].date===dateStr) return SCHEDULES[i];
  return null;
}
function upcomingShifts(){
  var ts=todayStr();
  return SCHEDULES.filter(function(s){ return s.date>=ts; }).slice(0,7);
}

/* =========================================================
   NOTIFICATIONS
   ========================================================= */
function computeNotifs(){
  NOTIFS=[];
  if(!DRIVER) return;
  var now=new Date();

  // Admin messages (newest first)
  MESSAGES.forEach(function(m){
    var color = m.level==='important' ? 'var(--red2)' : (m.level==='warn' ? 'var(--amber2)' : 'var(--blue2)');
    var bg    = m.level==='important' ? 'rgba(239,68,68,.14)' : (m.level==='warn' ? 'rgba(245,158,11,.14)' : 'rgba(59,130,246,.14)');
    var ic    = m.level==='important' ? 'ti-alert-octagon' : (m.level==='warn' ? 'ti-alert-triangle' : 'ti-message-circle');
    NOTIFS.push({
      ic: ic, color: color, bg: bg,
      title: m.title || '',
      desc: m.body || '',
      time: fmtDateTime(m.created_at)
    });
  });

  var lic=expiryStatus(DRIVER.license);
  if(lic.level==='bad'){
    var licPart = (lic.days<0) ? t('expired_since',Math.abs(lic.days)) : t('expires_in',lic.days);
    NOTIFS.push({ic:'ti-id-off',color:'var(--red2)',bg:'rgba(239,68,68,.14)',
      title:t('ntf_lic_expired_t'),
      desc:t('ntf_lic_prefix')+licPart+t('ntf_lic_expired_suffix'),
      time:t('ntf_important')});
  }else if(lic.level==='warn'){
    NOTIFS.push({ic:'ti-id',color:'var(--amber2)',bg:'rgba(245,158,11,.14)',
      title:t('ntf_lic_warn_t'),
      desc:t('ntf_lic_warn_d',lic.days),
      time:t('ntf_alert')});
  }

  var m=now.getMonth()+1, y=now.getFullYear();
  var monthDed=deductionsOf(m,y);
  if(monthDed.length){
    var total=monthDed.reduce(function(s,d){ return s+(parseFloat(d.amount)||0); },0);
    NOTIFS.push({ic:'ti-receipt-2',color:'var(--red2)',bg:'rgba(239,68,68,.14)',
      title:t('ntf_ded_t',monthDed.length),
      desc:t('ntf_ded_d',MONTHS[LANG][m-1],fmtKD(total)),
      time:MONTHS[LANG][m-1]+' '+y});
  }

  var up=upcomingShifts();
  if(up.length){
    var next=up[0];
    var isToday = next.date===todayStr();
    NOTIFS.push({ic:'ti-calendar-event',color:'var(--blue2)',bg:'rgba(59,130,246,.14)',
      title: isToday?t('ntf_shift_today'):t('ntf_shift_next'),
      desc:(isToday?t('today'):fmtDate(next.date))+(next.shift_start?' • '+next.shift_start+(next.shift_end?' - '+next.shift_end:''):'')+(next.shift_type?' • '+next.shift_type:''),
      time:t('ntf_schedule')});
  }

  if(!todayClockins().length){
    NOTIFS.push({ic:'ti-clock-exclamation',color:'var(--amber2)',bg:'rgba(245,158,11,.14)',
      title:t('ntf_no_clock_t'),
      desc:t('ntf_no_clock_d'),
      time:t('today')});
  }

  var dot=$('bellDot');
  if(NOTIFS.length){ dot.textContent=NOTIFS.length; dot.classList.remove('hide'); }
  else dot.classList.add('hide');
}

function _msgTime(iso){
  if(!iso) return '';
  var d = new Date(iso), now = new Date();
  var diff = Math.floor((now-d)/1000);
  if(diff < 60) return t('msg_just_now');
  if(diff < 3600) return Math.floor(diff/60)+(LANG==='en'?'m':'د');
  if(diff < 86400) return Math.floor(diff/3600)+(LANG==='en'?'h':'س');
  return d.toLocaleDateString(LANG==='en'?'en-US':'ar-KW',{day:'2-digit',month:'short'});
}

function renderNotifs(){
  var el=$('notifBody');
  if(!NOTIFS.length){
    el.innerHTML='<div class="empty"><i class="ti ti-message-2"></i><p>'+t('msg_empty')+'</p><div class="e-sub">'+t('msg_empty_sub')+'</div></div>';
    _ensureReplyBar();
    return;
  }
  // Sort chronologically (oldest at top, newest at bottom — like a chat)
  var msgs = NOTIFS.slice().sort(function(a,b){
    return new Date(a.created_at||a._raw_time||0) - new Date(b.created_at||b._raw_time||0);
  });

  var html = '<div style="display:flex;flex-direction:column;gap:10px;padding:8px 4px 14px">';
  msgs.forEach(function(n){
    var mine = (n.from_type === 'driver');
    var bg = mine ? 'linear-gradient(135deg,#2563eb,#1e40af)' : '#f1f5f9';
    var color = mine ? '#fff' : '#0f172a';
    var align = mine ? 'flex-end' : 'flex-start';
    var senderName = mine ? t('msg_you') : (n.from_name || t('msg_admin'));
    var br = mine ? '16px 16px 4px 16px' : '16px 16px 16px 4px';
    var bubble = '<div style="display:flex;flex-direction:column;align-items:'+align+';max-width:85%;'+(mine?'align-self:flex-end':'align-self:flex-start')+'">'+
      '<div style="font-size:10px;color:#64748b;margin:0 8px 3px;font-weight:700">'+senderName+'</div>'+
      '<div style="background:'+bg+';color:'+color+';padding:10px 14px;border-radius:'+br+';font-size:14px;line-height:1.5;word-break:break-word;box-shadow:0 2px 6px rgba(0,0,0,0.05)">'+
        ((n.title && n.title!=='رسالة دعم' && n.title!=='رد من السائق' && n.title!=='رد من الإدارة') ? '<div style="font-weight:900;margin-bottom:4px;font-size:13px">'+(n.title)+'</div>' : '')+
        '<div>'+(n.body||n.desc||'').replace(/\n/g,'<br>')+'</div>'+
      '</div>'+
      '<div style="font-size:10px;color:#94a3b8;margin:3px 8px 0">'+_msgTime(n.created_at||n._raw_time)+'</div>'+
    '</div>';
    html += bubble;
  });
  html += '</div>';
  el.innerHTML = html;
  _ensureReplyBar();
  // Scroll to bottom (newest)
  try {
    var sheet = document.getElementById('notifSheet');
    if(sheet){
      var body = sheet.querySelector('.sheet-body');
      if(body) body.scrollTop = body.scrollHeight;
    }
  } catch(e){}

  // Mark as read
  _markMessagesRead();
}

function _ensureReplyBar(){
  var sheet = document.getElementById('notifSheet');
  if(!sheet) return;
  var bar = document.getElementById('replyBar');
  if(bar) return;
  bar = document.createElement('div');
  bar.id = 'replyBar';
  bar.style.cssText = 'position:sticky;bottom:0;background:#fff;border-top:1px solid #e2e8f0;padding:10px;display:flex;gap:8px;align-items:center;margin:0 -16px -16px';
  bar.innerHTML = '<input id="replyInput" type="text" placeholder="'+t('msg_reply_ph')+'" style="flex:1;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:22px;font-family:inherit;font-size:14px;outline:none" onkeydown="if(event.key===\'Enter\'){sendReply()}">'+
    '<button onclick="sendReply()" style="background:linear-gradient(135deg,#2563eb,#1e40af);color:#fff;border:none;width:42px;height:42px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(37,99,235,0.4)"><i class="ti ti-send" style="font-size:18px"></i></button>';
  sheet.appendChild(bar);
}

async function sendReply(){
  var inp = document.getElementById('replyInput');
  if(!inp) return;
  var text = (inp.value||'').trim();
  if(!text) return;
  if(!DRIVER) return;
  inp.value = '';
  inp.disabled = true;
  try {
    await fetch(SUPA_URL+'/rest/v1/messages', {
      method:'POST',
      headers:{
        apikey:SUPA_KEY, Authorization:'Bearer '+SUPA_KEY,
        'Content-Type':'application/json', 'Prefer':'return=minimal'
      },
      body: JSON.stringify({
        recipient: 'admin',
        from_id: DRIVER.id,
        from_name: DRIVER.name,
        from_type: 'driver',
        title: 'رد من السائق',
        body: text,
        level: 'info',
        created_at: new Date().toISOString()
      })
    });
    // Optimistic add
    NOTIFS.push({
      from_type:'driver', from_name:DRIVER.name, body:text,
      created_at:new Date().toISOString(), _raw_time:new Date().toISOString()
    });
    renderNotifs();
  } catch(e){ console.error(e); toast(LANG==='en'?'Send failed':'فشل الإرسال'); }
  inp.disabled = false;
  inp.focus();
}

async function _markMessagesRead(){
  if(!DRIVER) return;
  try {
    var ids = NOTIFS.filter(function(n){ return n.id && !n.read_at && n.from_type !== 'driver'; }).map(function(n){ return n.id; });
    if(!ids.length) return;
    await fetch(SUPA_URL+'/rest/v1/messages?id=in.('+ids.join(',')+')', {
      method:'PATCH',
      headers:{
        apikey:SUPA_KEY, Authorization:'Bearer '+SUPA_KEY,
        'Content-Type':'application/json', 'Prefer':'return=minimal'
      },
      body: JSON.stringify({ read_at: new Date().toISOString() })
    });
    NOTIFS.forEach(function(n){ if(ids.indexOf(n.id)>=0) n.read_at = new Date().toISOString(); });
    _updateBellBadge();
  } catch(e){}
}

function _updateBellBadge(){
  var dot = document.getElementById('bellDot');
  if(!dot) return;
  var unread = NOTIFS.filter(function(n){ return !n.read_at && n.from_type !== 'driver'; }).length;
  if(unread > 0){
    dot.textContent = unread > 9 ? '9+' : String(unread);
    dot.classList.remove('hide');
  } else {
    dot.classList.add('hide');
  }
}

async function fetchMessages(){
  if(!DRIVER) return;
  try {
    var url = SUPA_URL+'/rest/v1/messages?or=(recipient.eq.'+encodeURIComponent(DRIVER.id)+',recipient.eq.all,and(from_id.eq.'+encodeURIComponent(DRIVER.id)+',recipient.eq.admin))&order=created_at.desc&limit=100&select=*';
    var res = await fetch(url, {headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
    var rows = await res.json();
    if(Array.isArray(rows)){
      NOTIFS = rows.map(function(r){
        return {
          id: r.id,
          from_id: r.from_id || 'admin',
          from_name: r.from_name || t('msg_admin'),
          from_type: r.from_type || 'admin',
          title: r.title || '',
          body: r.body || '',
          read_at: r.read_at,
          created_at: r.created_at,
          _raw_time: r.created_at
        };
      });
      _updateBellBadge();
    }
  } catch(e){ console.warn('fetchMessages', e); }
}

// Poll for new messages every 30 seconds
setInterval(function(){ if(DRIVER) fetchMessages(); }, 30000);

function switchTab(tab){
  currentTab=tab;
  var screens=['Home','Attendance','Orders','Report','Salary','Profile'];
  screens.forEach(function(s){ $('scr'+s).classList.add('hide'); $('nav'+s).classList.remove('on'); });
  var map={home:'Home',attendance:'Attendance',orders:'Orders',report:'Report',salary:'Salary',profile:'Profile'};

  $('scr'+s).classList.remove('hide');
  $('nav'+s).classList.add('on');
  window.scrollTo(0,0);
  renderCurrentTab();
}

  else if(currentTab==='report') renderReport();
  else if(currentTab==='salary') renderSalary();
  else if(currentTab==='profile') renderProfile();
}

/* =========================================================
   CLOCK ACTION (GPS + SUPABASE)
   ========================================================= */
function setClockBtnsBusy(busy, label){
  ['homeClockBtn','attClockBtn'].forEach(function(id){
    var b=$(id); if(!b) return;
    b.disabled=busy;
    if(busy) b.innerHTML='<div class="spinner" style="width:20px;height:20px;border-width:2px"></div> '+(label||'');
  });
}

function clockAction(action){
  if(busyClock) return;
  busyClock=true;
  setClockBtnsBusy(true,t('locating'));

  function finish(lat,lng){ submitClock(action,lat,lng); }

  if(!navigator.geolocation){
    toast(t('no_geo'),'info');
    finish(null,null);
    return;
  }
  navigator.geolocation.getCurrentPosition(
    function(pos){ finish(pos.coords.latitude, pos.coords.longitude); },
    function(err){
      console.warn('geo error',err);
      toast(t('geo_fail'),'info');
      finish(null,null);
    },
    {enableHighAccuracy:true, timeout:9000, maximumAge:0}
  );
}

function startLiveTracking(){
  stopLiveTracking();
  if(!DRIVER || !isCurrentlyIn()) return;
  sendLiveLocation();
  liveTrackingTimer = setInterval(sendLiveLocation, LIVE_TRACK_MS);
}
function stopLiveTracking(){
  if(liveTrackingTimer){ clearInterval(liveTrackingTimer); liveTrackingTimer = null; }
}

// Wake up tracking when app comes back to foreground (background tabs are throttled)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible' && DRIVER && isCurrentlyIn()){
    sendLiveLocation();           // immediate ping
    startLiveTracking();          // restart timer
  }
});
// Send on any user interaction (touch, click) while clocked in — covers phones that throttle BG timers heavily
['touchstart','click','focus'].forEach(function(ev){
  window.addEventListener(ev, function(){
    if(DRIVER && isCurrentlyIn()){
      // throttle: only resend if last send was >20s ago
      var now = Date.now();
      if(!window._lastLiveSend || (now - window._lastLiveSend) > 20000){
        window._lastLiveSend = now;
        sendLiveLocation();
      }
    }
  }, {passive:true});
});
function sendLiveLocation(){
  if(!DRIVER || !isCurrentlyIn()){ stopLiveTracking(); return; }
  if(!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos){
    fetch(SUPA_URL + '/rest/v1/driver_locations?on_conflict=driver_id', {
      method:'POST',
      headers:{
        'apikey':SUPA_KEY,
        'Authorization':'Bearer '+SUPA_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body:JSON.stringify({
        driver_id:DRIVER.id,
        driver_name:DRIVER.name,
        partner:DRIVER.partner||null,
        latitude:pos.coords.latitude,
        longitude:pos.coords.longitude,
        accuracy:pos.coords.accuracy,
        speed:pos.coords.speed,
        updated_at:new Date().toISOString()
      })
    }).catch(function(e){ console.warn('live loc err',e); });
  }, function(err){ console.warn('geo err',err); }, {enableHighAccuracy:true,timeout:9000,maximumAge:30000});
}

function submitClock(action,lat,lng){
  setClockBtnsBusy(true,t('registering'));
  var record={
    driver_id:   DRIVER.id,
    driver_name: DRIVER.name,
    partner:     DRIVER.partner||null,
    action:      action,
    latitude:    lat,
    longitude:   lng,
    created_at:  new Date().toISOString()
  };
  sb('clockin', {
    method:'POST',
    headers:{'Prefer':'return=minimal'},
    body:JSON.stringify(record)
  }).then(function(){
    CLOCKINS.unshift(record);
    saveCache();
    if(action==='clock_in') startLiveTracking(); else stopLiveTracking();
    computeNotifs();
    renderCurrentTab();
    toast(action==='clock_in'?t('clock_in_ok'):t('clock_out_ok'),'ok');
  }).catch(function(err){
    console.error(err);
    toast(t('clock_fail'),'err');
    renderCurrentTab();
  }).then(function(){
    busyClock=false;
  });
}

async function sendCustLocRequest(){
  var name = document.getElementById('cust-name').value.trim();
  var phone = document.getElementById('cust-phone').value.replace(/\D/g,'');
  if(!phone || phone.length < 7){ toast(t('custloc_validate_phone')); return; }

  // Generate token + create record
  var token = _custLocGenToken();
  try {
    await fetch(SUPA_URL+'/rest/v1/location_requests', {
      method:'POST',
      headers:{
        apikey:SUPA_KEY, Authorization:'Bearer '+SUPA_KEY,
        'Content-Type':'application/json', 'Prefer':'return=minimal'
      },
      body: JSON.stringify({
        token: token,
        driver_id: DRIVER.id,
        driver_name: DRIVER.name,
        request_type: 'driver',
        customer_phone: phone,
        customer_name: name || null,
        created_at: new Date().toISOString()
      })
    });
  } catch(e){
    console.error(e);
    toast(t('custloc_failure'));
    return;
  }

  // Build URL for share-location page
  var origin = location.origin + location.pathname.replace(/[^/]+$/, '');
  var shareUrl = origin + 'share-location.html?t=' + encodeURIComponent(token);

  // Open WhatsApp with prefilled message
  var msg = t('custloc_wa_msg', name, shareUrl);
  var waNum = phone.length === 8 ? '965'+phone : phone;
  var waUrl = 'https://wa.me/'+waNum+'?text='+encodeURIComponent(msg);
  window.open(waUrl, '_blank');

  // Save to history (without location yet)
  _saveCustLocHistory({token:token, name:name, phone:phone, time:new Date().toISOString()});

  // Start polling for the location
  custLocToken = token;
  custLocStartTime = Date.now();
  if(custLocPoller) clearInterval(custLocPoller);

  // Render waiting UI
  renderCustLocWaiting();

  var attempts = 0;
  custLocPoller = setInterval(async function(){
    attempts++;
    try {
      var res = await fetch(SUPA_URL+'/rest/v1/location_requests?token=eq.'+encodeURIComponent(token)+'&select=*',
        {headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY}});
      var rows = await res.json();
      if(rows && rows.length){
        var r = rows[0];
        if(r.received_at && r.latitude && r.longitude){
          clearInterval(custLocPoller); custLocPoller = null;
          // Update history with location
          try {
            var arr = JSON.parse(localStorage.getItem('fly_custloc_recent')||'[]');
            for(var i=0;i<arr.length;i++){
              if(arr[i].token === token){
                arr[i].lat = parseFloat(r.latitude);
                arr[i].lng = parseFloat(r.longitude);
                arr[i].accuracy = r.accuracy_meters;
                break;
              }
            }
            localStorage.setItem('fly_custloc_recent', JSON.stringify(arr));
          } catch(e){}
          renderCustLocReceived(r);
        }
      }
    } catch(e){ console.warn('poll err', e); }

    // Timeout after 5 minutes
    if(attempts > 150){
      clearInterval(custLocPoller); custLocPoller = null;
      var st = document.getElementById('custLocStatus');
      if(st) st.innerHTML = '<span style="color:#dc2626">'+t('custloc_timeout')+'</span>';
    }
  }, 2000);
}

async function submitDailyReport(){
  var orders = parseInt(document.getElementById('rep-orders').value)||0;
  var balance = parseFloat(document.getElementById('rep-balance').value)||0;
  var dFrom = parseInt(document.getElementById('rep-from').value);
  var dTo = parseInt(document.getElementById('rep-to').value);
  var fuel = parseFloat(document.getElementById('rep-fuel').value)||0;
  var notes = document.getElementById('rep-notes').value.trim();
  if(isNaN(dFrom) || dFrom < 0 || dFrom > 23){ toast(t('rep_validate_from')); return; }
  if(isNaN(dTo) || dTo < 0 || dTo > 23){ toast(t('rep_validate_to')); return; }
  // duty hours calc (handle overnight shift)
  var hours = (dTo - dFrom);
  if(hours <= 0) hours += 24;
  if(hours === 0) hours = 12; // fallback for "From 5 to 5" = full 12

  var today = new Date().toISOString().split('T')[0];
  var payload = {
    driver_id: DRIVER.id,
    driver_name: DRIVER.name,
    partner: DRIVER.partner||null,
    report_date: today,
    orders_count: orders,
    duty_from: dFrom,
    duty_to: dTo,
    duty_hours: hours,
    fuel_amount: fuel,
    card_balance: balance,
    notes: notes||null,
    submitted_via: 'fly',
    created_at: new Date().toISOString()
  };
  try {
    // upsert via on_conflict
    var res = await fetch(SUPA_URL+'/rest/v1/daily_reports?on_conflict=driver_id,report_date', {
      method:'POST',
      headers:{
        apikey:SUPA_KEY, Authorization:'Bearer '+SUPA_KEY,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify(payload)
    });
    if(!res.ok){ throw new Error('HTTP '+res.status); }
    toast(t('rep_success'));
    renderReport();
  } catch(e){
    console.error(e);
    toast(t('rep_failure'));
  }
}

function shareReportToWA(){
  var orders = parseInt(document.getElementById('rep-orders').value)||0;
  var balance = parseFloat(document.getElementById('rep-balance').value)||0;
  var dFrom = parseInt(document.getElementById('rep-from').value)||0;
  var dTo = parseInt(document.getElementById('rep-to').value)||0;
  var fuel = parseFloat(document.getElementById('rep-fuel').value)||0;
  var partnerName = (function(){
    if(typeof PARTNERS!=='undefined' && DRIVER.partner){
      var p = PARTNERS.find(function(x){return x.id===DRIVER.partner});
      return p ? p.name : (DRIVER.partner||'');
    }
    return DRIVER.partner||'';
  })();
  var msg = 'Daily Report 🖊\n' +
            '. Name: '+DRIVER.name+'\n' +
            '. Partners: '+partnerName+'\n' +
            '. Orders: ('+orders+') 📦\n' +
            '. Duty: From ('+dFrom+') to ('+dTo+') ⏰\n' +
            '. Fuel: ('+fuel.toFixed(3)+' kd) ⛽\n' +
            '. Card Balance: ('+balance.toFixed(3)+' kd) 💳';
  var url = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}

  if(!DRIVER || !DRIVER.id) return;
  try {
    var url = SUPA_URL + '/rest/v1/orders?driver_id=eq.' + DRIVER.id + '&order=created_at.desc&limit=100';

  updateOrdersBadge();

function updateOrdersBadge(){

async function updateOrderStatus(orderId, newStatus){
  var ok = confirm(newStatus==='picked_up' ? 'تأكيد استلام الأوردر من المطعم؟' : 'تأكيد توصيل الأوردر للعميل؟');
  if(!ok) return;
  try {
    var body = {status:newStatus};
    if(newStatus==='picked_up')  body.picked_at = new Date().toISOString();
    if(newStatus==='delivered')  body.delivered_at = new Date().toISOString();
    var res = await fetch(SUPA_URL+'/rest/v1/orders?id=eq.'+orderId, {
      method:'PATCH',
      headers:{apikey:SUPA_KEY,Authorization:'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body: JSON.stringify(body)
    });
    if(res.ok){
      toast(newStatus==='delivered'?'تم التوصيل ✅':'تم الاستلام ✅');
      renderOrders();
    } else {
      toast('فشل التحديث');
    }
  } catch(e){ console.error(e); toast('فشل: '+e.message.slice(0,40)); }
}
