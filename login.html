<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول — شركة السلاسل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Cairo',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f3a52 0%,#1c5878 50%,#0f3a52 100%);
    display:flex;align-items:center;justify-content:center;
    padding:20px;color:#0f172a;
    background-attachment:fixed;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(194,148,73,0.15) 0%, transparent 40%),
      radial-gradient(circle at 80% 80%, rgba(194,148,73,0.1) 0%, transparent 40%);
    pointer-events:none;
  }
  .container{
    width:100%;max-width:440px;
    background:#fff;border-radius:24px;
    box-shadow:0 30px 80px rgba(0,0,0,0.25);
    overflow:hidden;position:relative;z-index:1;
  }
  .header{
    background:linear-gradient(135deg,#0f3a52,#1c5878);
    color:#fff;padding:40px 30px 32px;text-align:center;
    border-bottom:5px solid #c29449;
    position:relative;
  }
  .header::after{
    content:'';position:absolute;bottom:-3px;left:0;right:0;height:6px;
    background:linear-gradient(90deg,transparent,#c29449,transparent);
  }
  .logo-circle{
    width:80px;height:80px;border-radius:50%;
    background:linear-gradient(135deg,#c29449,#e6b95d);
    margin:0 auto 16px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(194,148,73,0.4);
    font-size:34px;font-weight:900;color:#0f3a52;
  }
  .header h1{font-size:26px;font-weight:900;margin-bottom:6px;letter-spacing:0.5px}
  .header .subtitle{font-size:13px;color:#e2e8f0;font-weight:500}
  .header .en{font-size:11px;color:#c29449;font-weight:700;margin-top:8px;letter-spacing:2px}
  .form{padding:36px 32px}
  .form h2{font-size:20px;font-weight:800;color:#0f3a52;margin-bottom:6px;text-align:center}
  .form .welcome{font-size:13px;color:#64748b;text-align:center;margin-bottom:26px}
  .field{margin-bottom:18px}
  .field label{
    display:block;font-size:12px;font-weight:700;color:#475569;
    margin-bottom:6px;padding-right:2px;
  }
  .input-wrap{position:relative}
  .input-wrap input{
    width:100%;padding:14px 44px 14px 14px;
    font-family:'Cairo';font-size:14px;font-weight:600;
    border:2px solid #e2e8f0;border-radius:12px;
    background:#f8fafc;color:#0f172a;
    transition:all 0.2s;direction:ltr;text-align:right;
  }
  .input-wrap input:focus{
    outline:none;border-color:#c29449;background:#fff;
    box-shadow:0 0 0 3px rgba(194,148,73,0.15);
  }
  .input-wrap .icon{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:18px;color:#94a3b8;pointer-events:none;
  }
  .input-wrap input:focus + .icon{color:#c29449}
  .options{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:22px;font-size:12px;
  }
  .remember{display:flex;align-items:center;gap:6px;color:#64748b;cursor:pointer;font-weight:600}
  .remember input{width:16px;height:16px;accent-color:#c29449;cursor:pointer}
  .forgot{color:#c29449;text-decoration:none;font-weight:700}
  .forgot:hover{color:#0f3a52}
  .btn{
    width:100%;padding:15px;
    background:linear-gradient(135deg,#0f3a52,#1c5878);
    color:#fff;border:none;border-radius:12px;
    font-family:'Cairo';font-size:15px;font-weight:800;
    cursor:pointer;transition:all 0.2s;
    box-shadow:0 6px 16px rgba(15,58,82,0.25);
    display:flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(15,58,82,0.35)}
  .btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
  .btn .spin{
    width:16px;height:16px;border:2.5px solid rgba(255,255,255,0.3);
    border-top-color:#fff;border-radius:50%;
    animation:spin 0.7s linear infinite;display:none;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn.loading .spin{display:inline-block}
  .btn.loading .btn-text{opacity:0.7}
  .alert{
    padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;
    margin-bottom:16px;display:none;text-align:center;
  }
  .alert.on{display:block;animation:fadeIn 0.3s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .alert.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .alert.ok{background:#dcfce7;color:#166534;border:1px solid #86efac}
  .footer{
    padding:16px;background:#f8fafc;text-align:center;
    font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;
  }
  .footer .company{color:#0f3a52;font-weight:800;margin-bottom:3px;font-size:12px}
  .roles-hint{
    display:flex;flex-wrap:wrap;gap:5px;justify-content:center;
    margin-top:10px;
  }
  .role-badge{
    padding:3px 8px;background:#fdf6e9;color:#b45309;
    border-radius:12px;font-size:10px;font-weight:700;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo-circle">س</div>
    <h1>شركة السلاسل</h1>
    <div class="subtitle">لتوصيل الطلبات الاستهلاكية</div>
    <div class="en">AL-SALASIL · MANAGEMENT SYSTEM</div>
  </div>

  <form class="form" id="loginForm">
    <h2>تسجيل الدخول</h2>
    <div class="welcome">مرحباً بعودتك — أدخل بياناتك للمتابعة</div>

    <div class="alert err" id="alert-err"></div>
    <div class="alert ok" id="alert-ok"></div>

    <div class="field">
      <label>البريد الإلكتروني</label>
      <div class="input-wrap">
        <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        <span class="icon">✉️</span>
      </div>
    </div>

    <div class="field">
      <label>كلمة السر</label>
      <div class="input-wrap">
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        <span class="icon">🔒</span>
      </div>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        تذكرني
      </label>
      <a href="#" class="forgot" id="forgotBtn">نسيت كلمة السر؟</a>
    </div>

    <button type="submit" class="btn" id="loginBtn">
      <span class="spin"></span>
      <span class="btn-text">دخول للنظام</span>
    </button>

    <div class="roles-hint">
      <span class="role-badge">المدير العام</span>
      <span class="role-badge">المحاسبة</span>
      <span class="role-badge">HR</span>
      <span class="role-badge">العمليات</span>
      <span class="role-badge">سوبر فايزر</span>
    </div>
  </form>

  <div class="footer">
    <div class="company">شركة السلاسل لتوصيل الطلبات الاستهلاكية</div>
    <div>© 2026 · Kuwait — نظام إدارة داخلي</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPA_URL = 'https://pqpowedqewjgkrzvmgyv.supabase.co';
const SUPA_KEY = 'sb_publishable_EX532ME5SLrt26Gp3YkRXQ_rt9-oaRT';
const supabase = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, storage: window.localStorage }
});

const $ = id => document.getElementById(id);
function alertErr(msg){ $('alert-ok').classList.remove('on'); const e=$('alert-err'); e.textContent=msg; e.classList.add('on'); }
function alertOk(msg){ $('alert-err').classList.remove('on'); const e=$('alert-ok'); e.textContent=msg; e.classList.add('on'); }
function hideAlerts(){ $('alert-err').classList.remove('on'); $('alert-ok').classList.remove('on'); }

// Check if already logged in
supabase.auth.getSession().then(({data:{session}}) => {
  if (session) {
    window.location.href = 'السلاسل_نظام_ادارة_السائقين_28.html';
  }
});

// Handle login
$('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  hideAlerts();
  const btn = $('loginBtn');
  const email = $('email').value.trim();
  const password = $('password').value;

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Fetch profile
    const { data: profile, error: pErr } = await supabase
      .from('profiles')
      .select('full_name, full_name_ar, role, is_active')
      .eq('id', data.user.id)
      .single();

    if (pErr) throw new Error('لا يمكن قراءة بيانات المستخدم');
    if (!profile.is_active) {
      await supabase.auth.signOut();
      throw new Error('حسابك غير مفعّل — تواصل مع الإدارة');
    }

    // Update last login
    await supabase.from('profiles').update({ last_login_at: new Date().toISOString() }).eq('id', data.user.id);

    const displayName = profile.full_name_ar || profile.full_name;
    alertOk('أهلاً ' + displayName + ' · جاري التحويل...');

    setTimeout(() => {
      window.location.href = 'السلاسل_نظام_ادارة_السائقين_28.html';
    }, 900);

  } catch (err) {
    let msg = err.message || 'فشل تسجيل الدخول';
    if (msg.includes('Invalid login')) msg = 'الإيميل أو كلمة السر غير صحيحة';
    else if (msg.includes('Email not confirmed')) msg = 'يرجى تفعيل البريد الإلكتروني أولاً';
    alertErr('❌  ' + msg);
    btn.classList.remove('loading');
    btn.disabled = false;
  }
});

// Forgot password
$('forgotBtn').addEventListener('click', async (e) => {
  e.preventDefault();
  const email = $('email').value.trim();
  if (!email) { alertErr('اكتب بريدك الإلكتروني أولاً'); $('email').focus(); return; }
  hideAlerts();

  try {
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html'
    });
    if (error) throw error;
    alertOk('✅ تم إرسال رابط إعادة تعيين كلمة السر إلى بريدك');
  } catch (err) {
    alertErr('❌ ' + (err.message || 'فشل الإرسال'));
  }
});
</script>
</body>
</html>
